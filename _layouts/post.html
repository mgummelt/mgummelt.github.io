<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{{ page.title }}</title >

  <style>
    body {
      max-width: 700px;
      margin: 40px auto;
      padding: 0 20px;

      font-family: Georgia, serif;
      font-size: 20px;
      line-height: 1.7;
      color: #222;
    }

    h1 {
      line-height: 1.2;
    }

    p {
      margin: 1.2em 0;
    }

    blockquote {
        position: relative;
        margin: 2rem 0;
        padding-left: 2.5rem;
        font-style: italic;
    }

    blockquote::before {
        content: "“";
        position: absolute;
        left: 0;
        top: -0.3rem;
        font-size: 4rem;
        line-height: 1;
        opacity: 0.2;
    }
  </style>
</head>
<script data-goatcounter="https://mgummelt.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
<body>
  {{ content }}
</body>
</html>
